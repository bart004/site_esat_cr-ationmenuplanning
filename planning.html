<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESAT APAJH 94 - Atelier Planning</title>
  <link rel="stylesheet" href="style.css">
</head>
<!-- connexion à mon js qui gère mon supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<!-- Fin Supabase -->
<body class="planning-page">
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">ESAT APAJH 94</a>
      <button class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">☰</button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Accueil</a>
        <a href="menus.html">Atelier Menus</a>
        <a class="active" href="planning.html">Atelier Planning</a>
        <a href="videos.html">Vidéos tuto</a>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <h1>Atelier planning hebdomadaire</h1>

    <div class="toolbar no-print">
      <label for="planningWeek">Semaine du :</label>
      <input id="planningWeek" type="date">
      <button id="clearPlanningBtn" class="btn btn-red">🗑️ Tout effacer</button>
      <button id="printPlanningBtn" class="btn btn-green">🖨️ Imprimer</button>
    </div>

    <div id="planningPrintTitle" class="print-title"></div>

    <div class="planning-grid-wrap">
      <table class="planning-table">
        <thead>
          <tr>
            <th>LUNDI</th>
            <th>MARDI</th>
            <th>MERCREDI</th>
            <th>JEUDI</th>
            <th>VENDREDI</th>
          </tr>
        </thead>
        <tbody>
          <tr id="planningColumnsRow">
            <td><div class="day-column" data-day="0"></div></td>
            <td><div class="day-column" data-day="1"></div></td>
            <td><div class="day-column" data-day="2"></div></td>
            <td><div class="day-column" data-day="3"></div></td>
            <td><div class="day-column" data-day="4"></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>Adresse : 41 rue Le-Corbusier — 94000 CRÉTEIL</p>
      <p>Tél. : 01 45 13 14 50 | Fax : 01 45 13 14 59 | Mail : apajh94@apajh94.fr</p>
      <p>Copyright © 2025 ESAT APAJH 94</p>
    </div>
  </footer>

  <script src="js/planning.js"></script>
</body>
</html>
